http:
  routers:
    mailpit:
      entryPoints:
        - "https"
      rule: "Host(`mailpit.domain.com`)"
      tls: {}
      service: mailpit
  services:
    mailpit:
      loadBalancer:
        servers:
          - url: "http://10.0.0.45"
        passHostHeader: true

tcp:
  routers:
    mailpit-smtp:
      entryPoints:
        - "mailpit-smtp"
      rule: "HostSNI(`*`)"
      service: mailpit-smtp

  services:
    mailpit-smtp:
      loadBalancer:
        servers:
          - address: "10.0.0.45:1025"
